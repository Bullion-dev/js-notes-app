<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/output.css">
        <title>Note App</title>
    </head>
    <body class="bg-slate-300 min-h-screen flex items-center justify-center">
<div class="flex flex-col items-center bg-slate-200 px-10 py-20 border-4 rounded-md">
    <label id="text" class="text-black p-2">Notes</label>
    <textarea id="note-input" class="w-full border border-slate-300 rounded-md p-2 h-28 resize-none text-black outline-none" placeholder="Write a note..."></textarea>
    <div class="flex items-center justify-center">
    <button onclick="save()" class="rounded p-3 m-3 text-black bg-gray-400 hover:bg-gray-500 ">Save</button>
    
</div>
<ul id="note-list"></ul>
</div>
    <script src="app.js"></script>
    </body>
</html>
